services:
  server:
    build: 
      context: ${SERVER_DIR}
      args:
        - PORT=${SERVER_PORT}
        - BASE_IMAGE=python:3.14-trixie

  # ui: TODO:

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    environment:
      - SERVER_URL=http://server:${SERVER_PORT}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template
    command: /bin/bash -c "envsubst $${SERVER_URL} < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - server
